# unit_prompts.toml — Character descriptions for AI sprite generation
#
# Each unit has:
#   base_desc: Full appearance description (race, build, clothing, colors, features)
#   faction: loyalist / elf / orc
#   weapon: Primary weapon (inserted into animation prompts)
#   portrait_fuzz: Optional override for portrait background removal fuzz % (default 20)

# ── Loyalists (7 units) ────────────────────────────────────────────────

[mage]
faction = "loyalist"
base_desc = "An elderly wizard mage. Long flowing white beard, wearing purple/violet ornate robes with gold trim and a tall pointed wizard hat. Wise, weathered face."
weapon = "tall wooden staff topped with a glowing purple crystal orb"
portrait_fuzz = 8

[spearman]
faction = "loyalist"
base_desc = "A young human soldier in chain mail armor over a blue tunic. Clean-shaven with short brown hair. Sturdy build, determined expression."
weapon = "long iron-tipped spear held upright and a round wooden shield with blue crest"

[bowman]
faction = "loyalist"
base_desc = "A lean human archer wearing a green leather jerkin over a brown tunic. Short reddish-brown hair, keen eyes. Light armor for mobility."
weapon = "wooden longbow with a quiver of arrows on his back"

[cavalryman]
faction = "loyalist"
base_desc = "A mounted human knight in polished plate armor with a red cape. Strong jaw, short dark hair. Riding a brown war horse with barding."
weapon = "long steel lance and a kite shield with red heraldry"

[heavy_infantryman]
faction = "loyalist"
base_desc = "A burly human soldier in full heavy plate armor. Broad-shouldered, barrel-chested. Helmet with nose guard, thick brown beard visible beneath."
weapon = "massive double-bladed battle axe"

[lieutenant]
faction = "loyalist"
base_desc = "A commanding human officer in ornate silver plate armor with gold accents and a flowing blue cape. Noble bearing, graying temples, trimmed beard."
weapon = "gleaming longsword and a tower shield with royal crest"

[sergeant]
faction = "loyalist"
base_desc = "A veteran human soldier in well-worn chain mail with a red sash. Scarred face, short-cropped gray hair, muscular build. Battle-hardened appearance."
weapon = "short steel sword and a battered round shield"

# ── Elves (5 units) ────────────────────────────────────────────────────

[elvish_archer]
faction = "elf"
base_desc = "A graceful elf archer with long silver-blonde hair and pointed ears. Wearing forest green leather armor with leaf motifs. Slender, elegant build."
weapon = "finely crafted elven longbow of pale wood with silver inlay"

[elvish_captain]
faction = "elf"
base_desc = "A commanding elf warrior with flowing golden hair and a silver circlet. Wearing gleaming elven plate armor with forest green cape. Tall, regal bearing."
weapon = "elegant elven longsword with leaf-shaped blade and a silver buckler"

[elvish_fighter]
faction = "elf"
base_desc = "An athletic elf swordsman with short dark hair and sharp features. Wearing light green leather armor with silver clasps. Agile, balanced stance."
weapon = "curved elven shortsword and a small leaf-shaped shield"

[elvish_scout]
faction = "elf"
base_desc = "A lithe elf ranger in dark forest green cloak and leather armor. Long braided auburn hair, alert expression. Built for speed and stealth."
weapon = "pair of slender elven daggers with leaf-shaped blades"

[elvish_shaman]
faction = "elf"
base_desc = "A mystical elf healer in flowing white and green robes with nature motifs. Long silver hair adorned with small flowers and vines. Serene expression, glowing green eyes."
weapon = "gnarled wooden staff wrapped in living vines with a glowing green crystal"
portrait_fuzz = 10

# ── Orcs (4 units) ──────────────────────────────────────────────────────

[orcish_grunt]
faction = "orc"
base_desc = "A hulking green-skinned orc warrior with tusks and a scarred face. Wearing crude iron and leather armor with fur trim. Massive muscular build, menacing expression."
weapon = "heavy rusted iron cleaver and a crude wooden shield with iron boss"

[orcish_warrior]
faction = "orc"
base_desc = "A battle-scarred green-skinned orc veteran in black iron plate armor with red war paint. Large tusks, shaved head with a topknot. Imposing, fearsome presence."
weapon = "enormous two-handed orcish greatsword with jagged blade"

[orcish_archer]
faction = "orc"
base_desc = "A wiry green-skinned orc with a crafty expression and yellowed tusks. Wearing dark leather armor with bone decorations. Lean but muscular."
weapon = "crude but powerful orcish crossbow made of dark wood and iron"

[orcish_assassin]
faction = "orc"
base_desc = "A lean, shadowy green-skinned orc in dark hooded leather armor. Face half-hidden by a dark cowl, glowing yellow eyes. Stealthy, predatory stance."
weapon = "pair of curved poisoned daggers with dark blades"
